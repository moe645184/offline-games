<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1035">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>遊戲樂園</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  min-height:100%; width:100%;
  background:#1a1035;
  font-family:sans-serif;
  overflow-x:hidden;
}

/* Soft background glow */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(180,100,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(80,180,255,0.10) 0%, transparent 60%);
  pointer-events:none;
}

/* Top decoration */
#topbar {
  padding: 24px 20px 8px;
  display:flex;
  justify-content:center;
}
#logo {
  font-size: 52px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-8px); }
}

/* Grid */
#grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 16px;
  max-width: 480px;
  margin: 0 auto;
}

/* Game card */
.game-card {
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px 12px 20px;
  cursor: pointer;
  transition: transform 0.15s, background 0.15s;
  text-decoration: none;
  gap: 10px;
  position: relative;
  overflow: hidden;
  min-height: 160px;
}
.game-card:active {
  transform: scale(0.94);
  background: rgba(255,255,255,0.13);
}

/* Card glow on tap */
.game-card::after {
  content:'';
  position:absolute; inset:0;
  border-radius:24px;
  opacity:0;
  transition:opacity 0.2s;
}
.game-card:active::after { opacity:1; }

.card-bubble::after  { background: radial-gradient(circle, rgba(255,100,180,0.2), transparent); }
.card-memory::after  { background: radial-gradient(circle, rgba(100,220,180,0.2), transparent); }

.game-icon {
  font-size: 72px;
  line-height: 1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
}

/* Colored dot indicator instead of text */
.game-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  opacity: 0.7;
}
.card-bubble .game-dot  { background: #ff6b9d; }
.card-memory .game-dot  { background: #38d9a9; }

/* Bottom padding */
#footer { height: 24px; }
</style>
</head>
<body>

<div id="topbar">
  <span id="logo">🎮</span>
</div>

<div id="grid">

  <a class="game-card card-bubble" href="games/bubble/index.html">
    <span class="game-icon">🫧</span>
    <div class="game-dot"></div>
  </a>

  <a class="game-card card-memory" href="games/memory/index.html">
    <span class="game-icon">🃏</span>
    <div class="game-dot"></div>
  </a>

  <!-- 以後新增遊戲，複製上面的 <a> 區塊，改 href 和 emoji 就好 -->

</div>

<div id="footer"></div>

<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
