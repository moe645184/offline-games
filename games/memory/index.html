<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<title>翻牌配對</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  min-height:100%; width:100%;
  background:#0a1a2e;
  font-family:sans-serif;
  overflow-x:hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(50,200,150,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 70%, rgba(50,120,255,0.08) 0%, transparent 60%);
  pointer-events:none;
}

/* Top bar */
#topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 10px;
  position:relative; z-index:1;
}
#home-btn {
  font-size:28px; text-decoration:none;
  width:44px; height:44px;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.07);
  border-radius:12px;
}
#home-btn:active { background:rgba(255,255,255,0.15); }

#stars-display {
  display:flex; gap:4px; align-items:center;
}
.star-icon { font-size:20px; opacity:0.3; transition:opacity 0.3s, transform 0.3s; }
.star-icon.lit { opacity:1; transform:scale(1.2); }

#moves-display {
  font-size:22px;
  background:rgba(255,255,255,0.07);
  border-radius:12px;
  padding:6px 14px;
  color:#fff;
  min-width:44px;
  text-align:center;
}

/* Grid */
#board {
  display:grid;
  gap:10px;
  padding:10px 12px 20px;
  max-width:480px;
  margin:0 auto;
}

/* Card */
.card {
  aspect-ratio:1;
  border-radius:18px;
  cursor:pointer;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.4s ease;
  user-select:none;
}
.card.flipped { transform:rotateY(180deg); }
.card.matched { transform:rotateY(180deg); cursor:default; }

.card-face {
  position:absolute; inset:0;
  border-radius:18px;
  display:flex; align-items:center; justify-content:center;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

/* Back face */
.card-back {
  background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.14);
  font-size:28px;
}

/* Front face */
.card-front {
  background:rgba(255,255,255,0.12);
  border:1.5px solid rgba(255,255,255,0.25);
  transform:rotateY(180deg);
}
.card-front .emoji {
  line-height:1;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}
.card.matched .card-front {
  background:rgba(56,217,169,0.2);
  border-color:rgba(56,217,169,0.5);
}

/* Win overlay */
#win-overlay {
  display:none;
  position:fixed; inset:0;
  background:rgba(10,26,46,0.93);
  z-index:20;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}
.win-emoji { font-size:80px; animation:pop 0.5s ease; }
@keyframes pop { from{transform:scale(0) rotate(-20deg)} to{transform:scale(1) rotate(0)} }

.win-stars { font-size:36px; letter-spacing:6px; }

#play-again-btn {
  width:110px; height:110px;
  border-radius:50%; border:none;
  background:linear-gradient(135deg,#38d9a9,#20b280);
  font-size:44px; cursor:pointer;
  box-shadow:0 0 30px rgba(56,217,169,0.4);
  animation:pulse 1.8s ease-in-out infinite;
  transition:transform 0.15s;
}
#play-again-btn:active { transform:scale(0.92); }
@keyframes pulse {
  0%,100%{box-shadow:0 0 16px rgba(56,217,169,0.3)}
  50%{box-shadow:0 0 40px rgba(56,217,169,0.6)}
}

#home-big-btn {
  width:80px; height:80px;
  border-radius:50%; border:none;
  background:rgba(255,255,255,0.1);
  font-size:36px; cursor:pointer;
  transition:transform 0.15s, background 0.15s;
  text-decoration:none;
  display:flex; align-items:center; justify-content:center;
}
#home-big-btn:active { transform:scale(0.92); background:rgba(255,255,255,0.2); }
</style>
</head>
<body>

<div id="topbar">
  <a id="home-btn" href="../../index.html">🏠</a>
  <div id="stars-display">
    <span class="star-icon" id="s1">⭐</span>
    <span class="star-icon" id="s2">⭐</span>
    <span class="star-icon" id="s3">⭐</span>
  </div>
  <div id="moves-display">🔄 0</div>
</div>

<div id="board"></div>

<div id="win-overlay">
  <div class="win-emoji">🎉</div>
  <div class="win-stars" id="win-stars"></div>
  <button id="play-again-btn" onclick="startGame()">↺</button>
  <a id="home-big-btn" href="../../index.html">🏠</a>
</div>

<script>
// Audio
const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC(){ if(AC.state==='suspended') AC.resume(); }
function playTone(freq,type,dur,vol=0.25,delay=0){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.setValueAtTime(freq,AC.currentTime+delay);
  g.gain.setValueAtTime(vol,AC.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+delay+dur);
  o.start(AC.currentTime+delay);o.stop(AC.currentTime+delay+dur+0.05);
}
function sfxFlip(){ playTone(400,'sine',0.1,0.2); }
function sfxMatch(){ [0,0.08,0.16].forEach((d,i)=>playTone([523,659,784][i],'sine',0.18,0.3,d)); }
function sfxFail(){ playTone(250,'sawtooth',0.15,0.2); }
function sfxWin(){
  [0,0.12,0.24,0.36,0.48].forEach((d,i)=>
    playTone([523,587,659,784,1047][i],'sine',0.25,0.35,d)
  );
}

// Emoji sets by level
const EMOJI_SETS = [
  ['🐶','🐱','🐭','🐹','🐰','🦊'],       // Level 1 - 6 pairs (easy)
  ['🌸','🌻','🌈','⭐','🍎','🍊','🎈','🎀'], // Level 2 - 8 pairs
  ['🦁','🐯','🐻','🐼','🐨','🦄','🦋','🌺','🍇','🎵'], // Level 3 - 10 pairs
];

let level=0, moves=0, flipped=[], matched=0, locked=false;

function getGridCols(pairs){
  if(pairs<=6) return 3;
  if(pairs<=8) return 4;
  return 4;
}

function startGame(){
  document.getElementById('win-overlay').style.display='none';
  moves=0; flipped=[]; matched=0; locked=false;
  document.getElementById('moves-display').textContent='🔄 0';
  ['s1','s2','s3'].forEach(id=>document.getElementById(id).classList.remove('lit'));

  const emojis=EMOJI_SETS[level];
  const pairs=[...emojis,...emojis].sort(()=>Math.random()-0.5);
  const cols=getGridCols(emojis.length);
  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${cols}, 1fr)`;
  board.innerHTML='';

  // Font size based on card count
  const emojiSize = pairs.length<=12 ? '52px' : pairs.length<=16 ? '42px' : '34px';

  pairs.forEach((emoji,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.emoji=emoji;
    card.dataset.index=i;
    card.innerHTML=`
      <div class="card-face card-back">🌟</div>
      <div class="card-face card-front">
        <span class="emoji" style="font-size:${emojiSize}">${emoji}</span>
      </div>
    `;
    card.addEventListener('click',()=>{ resumeAC(); onCardClick(card); });
    board.appendChild(card);
  });
}

function onCardClick(card){
  if(locked||card.classList.contains('flipped')||card.classList.contains('matched')) return;
  sfxFlip();
  card.classList.add('flipped');
  flipped.push(card);
  if(flipped.length===2) checkMatch();
}

function checkMatch(){
  locked=true;
  moves++;
  document.getElementById('moves-display').textContent='🔄 '+moves;
  const [a,b]=flipped;
  if(a.dataset.emoji===b.dataset.emoji){
    sfxMatch();
    a.classList.add('matched');
    b.classList.add('matched');
    matched+=2;
    flipped=[];
    locked=false;
    if(matched===document.querySelectorAll('.card').length) onWin();
  } else {
    sfxFail();
    setTimeout(()=>{
      a.classList.remove('flipped');
      b.classList.remove('flipped');
      flipped=[];
      locked=false;
    },900);
  }
}

function onWin(){
  sfxWin();
  const total=document.querySelectorAll('.card').length;
  const perfect=total; // perfect moves = number of pairs
  const stars = moves <= total/2*1.2 ? 3 : moves <= total/2*1.8 ? 2 : 1;
  setTimeout(()=>{
    document.getElementById('win-overlay').style.display='flex';
    document.getElementById('win-stars').textContent='⭐'.repeat(stars);
    ['s1','s2','s3'].forEach((id,i)=>{
      if(i<stars) setTimeout(()=>document.getElementById(id).classList.add('lit'),i*200);
    });
    // Advance level
    level=(level+1)%EMOJI_SETS.length;
  },600);
}

document.addEventListener('touchstart',resumeAC,{once:true});
startGame();
</script>
</body>
</html>
